<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="ru">
<head>
    <title wicket:id="login.title"></title>
</head>
<body>

<div class="container-fluid">
    <header>
        <div id="logo"></div>
    </header>

    <div class="content">
        <div class="panel panel-default login center">
            <div class="panel-heading">
                <h3 class="panel-title" wicket:id="login.header"></h3>
            </div>

            <div class="panel-body">
                <form id="formId"  method="POST" action="j_security_check">
                    <div class="form-group">
                        <label for="j_username"><wicket:message key="login.login_label"/></label>
                        <input id="j_username" name="j_username" type="text" class="form-control"/>
                    </div>

                    <div class="form-group">
                        <label for="j_password"><wicket:message key="login.password_label"/></label>
                        <input id="j_password" name="j_password" type="password" class="form-control"/>
                    </div>

                    <button type="submit" class="btn btn-default" wicket:message="value:login.submit">
                        <wicket:message key="login.submit"/>
                    </button>
                </form>
            </div>

            <div class="panel-footer" wicket:id="errorPanel">
                <wicket:message key="login.error.unauthorized"/>
            </div>
        </div>
    </div>
</div>
</body>
</html>
