<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="ru">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>

    <div class="container-fluid">
        <header>
            <nav class="navbar">
                <div class="navbar-header">
                    <a class="navbar-brand" href="#">
                        Complitex
                    </a>
                </div>

                <ul class="nav navbar-nav navbar-right">
                    <li>
                        <span wicket:id="mainUserOrganizationPicker" class="navbar-text">HELLO</span>
                    </li>
                    <li>
                        <span wicket:id="current_user_fullname" class="navbar-text"></span>
                    </li>
                    <li>
                        <a wicket:id="profile" wicket:message="title:profile">
                            <i class="glyphicon glyphicon-user"></i>
                        </a>
                    </li>
                    <li>
                        <a wicket:id="exit" wicket:message="title:exit">
                            <i class="glyphicon glyphicon-log-out"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </header>
    </div>

        <table border="0" cellspacing="0" cellpadding="0" width="100%">
            <tr>
                <td id="Header">
                    <div>
                        <a href="#" wicket:id="home">
                            <span style="position:absolute; height: 85px; width:350px;"></span>
                        </a>
                    </div>

                    <div id="LoginForm">
                        <table border="0" cellspacing="0" cellpadding="0" >
                            <tr>
                                <td>
                                    <table>
                                        <tr><td></td></tr>
                                        <tr>
                                            <td>

                                            </td>
                                        </tr>
                                        <tr><td></td></tr>
                                    </table>
                                </td>
                                <td>

                                </td>
                            </tr>
                        </table>
                    </div>
                </td>
            </tr>
            <tr>
                <td id="TopPanel">
                    <div wicket:id="infoPanelButton" id="ButtonMain" class="expanded">
                        <div>
                            <wicket:message key="main-sidebar.message"/>
                        </div>
                    </div>
                    <div wicket:id="toolbar">
                        <span wicket:id="commonPart">
                            <span wicket:id="commonButton"></span>
                        </span>
                        <span wicket:id="applicationPart">
                            <span wicket:id="applicationButton"></span>
                        </span>
                        <span wicket:id="pagePart">
                            <span wicket:id="pageButton"></span>
                        </span>
                    </div>
                </td>
            </tr>
            <tr>
                <td>
                    <div wicket:id="infoPanel" id="LeftPanel">
                        <div class="block LeftBlock" wicket:id="sidebar">
                            <div wicket:id="menu_placeholder">[menu content will go here]</div>
                            <wicket:fragment wicket:id="menu">
                                <h2 class="expanded">
                                    <div>
                                        <span wicket:id="menu_title">
                                        </span>
                                    </div>
                                </h2>
                                <div class="bottom">
                                    <div class="content">
                                        <ul>
                                            <li wicket:id="menu_items">
                                                <a href="#" wicket:id="link"><span wicket:id="label"></span></a>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </wicket:fragment>
                        </div>
                    </div>
                    <div id="Content" class="ContentCollapsed">
                        <wicket:child/>
                    </div>
                </td>
            </tr>
        </table>
    </body>
</html>
