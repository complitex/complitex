<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="ru">
<head>
    <wicket:head><title wicket:id="title"></title></wicket:head>
</head>

<body>
<wicket:extend>
    <div id="messages" wicket:id="messages"></div>

    <form wicket:id="form" class="form-horizontal">
        <div class="form-group">
            <label for="login" class="col-sm-2 control-label"><wicket:message key="login"/><b class="blue">*</b></label>
            <div class="col-sm-4">
                <input id="login" wicket:id="login" type="text"/>
            </div>
        </div>

        <div class="form-group">
            <label for="password" class="col-sm-2 control-label"><wicket:message key="password"/></label>
            <div class="col-sm-4">
                <input id="password" wicket:id="password" type="password"/>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label"><wicket:message key="locale"/></label>
            <div class="col-sm-4">
                <div wicket:id="locale"></div>
            </div>
        </div>

        <div wicket:id="user_info"></div>

        <div class="form-group">
            <label class="col-sm-2 control-label"><wicket:message key="usergroup"/></label>
            <div class="col-sm-10">
                <div wicket:id="usergroups">
                    <ul>
                        <li>
                            <input type="checkbox" wicket:id="ADMINISTRATORS"/>
                            <wicket:message key="ADMINISTRATORS"/>
                        </li>
                        <li>
                            <input type="checkbox" wicket:id="EMPLOYEES"/>
                            <wicket:message key="EMPLOYEES"/>
                        </li>
                        <li>
                            <input type="checkbox" wicket:id="EMPLOYEES_CHILD_VIEW"/>
                            <wicket:message key="EMPLOYEES_CHILD_VIEW"/>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label"><wicket:message key="organizations"/></label>
            <div class="col-sm-10">
                <div wicket:id="organizationContainer">
                    <div wicket:id="organizationGroup">
                        <div wicket:id="userOrganizations">
                            <input type="radio" wicket:id="radio"/>
                            <span wicket:id="organizationObjectId"></span>
                            <a wicket:id="delete"><wicket:message key="delete"/></a>
                        </div>
                    </div>
                </div>
                <a wicket:id="addOrganization"><wicket:message key="add"/></a>
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label"><wicket:message key="default_address"/></label>
            <div class="col-sm-10" wicket:id="addressContainer">
                <span wicket:id="searchComponent"></span>
                <div class="checkbox">
                    <label>
                        <input type="checkbox" wicket:id="use_default_address"/><wicket:message key="use_default_address"/>
                    </label>
                </div>
            </div>
        </div>

        <div class="col-sm-offset-2 col-sm-10">
            <button class="btn btn-default" wicket:id="save"><wicket:message key="save"/></button>
            <button class="btn btn-default" wicket:id="cancel"><wicket:message key="cancel"/></button>
        </div>
    </form>
</wicket:extend>
</body>
</html>
