<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org" lang="ru">
<head>
    <wicket:head>
        <title wicket:id="title"></title>
    </wicket:head>
</head>

<body>
<wicket:extend>
    <h1><wicket:message key="title"/></h1>

    <div wicket:id="content">
        <form action="#" wicket:id="filter_form">
            <table class="table table-hover table-condensed table-filter">
                <thead>
                <tr>
                    <th>
                        <span wicket:id="header.login">
                            <wicket:message key="login"/>
                        </span>
                    </th>
                    <wicket:container wicket:id="header.user_info"/>
                    <th>
                        <wicket:message key="organization"/>
                    </th>
                    <th>
                        <wicket:message key="usergroup"/>
                    </th>
                    <th>
                        <button wicket:id="reset" class="btn btn-filter">
                            <wicket:message key="reset"/>
                        </button>
                    </th>
                </tr>
                <tr>
                    <td>
                        <input type="text" wicket:id="login" class="form-control input-sm"/>
                    </td>
                    <wicket:container wicket:id="user_info"/>
                    <td>
                        <span wicket:id="organization"></span>
                    </td>
                    <td>
                        <select wicket:id="usergroups" class="form-control input-sm"></select>
                    </td>
                    <td>
                        <button wicket:id="submit" class="btn btn-filter">
                            <wicket:message key="filter"/>
                        </button>
                    </td>
                </tr>
                </thead>
                <tbody>
                <tr wicket:id="users">
                    <td><span wicket:id="login"></span></td>
                    <wicket:container wicket:id="user_info"/>
                    <td><span wicket:id="organizations"></span></td>
                    <td><span wicket:id="usergroup"></span></td>
                    <td>
                        <span wicket:id="action_edit"></span>
                        <span wicket:id="action_copy"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </form>
        <div wicket:id="navigator"></div>
    </div>
</wicket:extend>
</body>
</html>
