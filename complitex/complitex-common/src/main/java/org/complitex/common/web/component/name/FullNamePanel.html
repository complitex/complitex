<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<wicket:panel xmlns:wicket="http://wicket.apache.org">
    <div class="form-group">
        <label class="col-sm-2 control-label">
            <wicket:message key="last_name"/><b class="blue">*</b>
        </label>
        <div wicket:id="last_name" class="col-sm-4"></div>
    </div>

    <div class="form-group">
        <label class="col-sm-2 control-label">
            <wicket:message key="first_name"/><b class="blue">*</b>
        </label>
        <div wicket:id="first_name" class="col-sm-4"></div>
    </div>

    <div class="form-group">
        <label class="col-sm-2 control-label">
            <wicket:message key="middle_name"/><b class="blue">*</b>
        </label>
        <div wicket:id="middle_name" class="col-sm-4"></div>
    </div>
</wicket:panel>
